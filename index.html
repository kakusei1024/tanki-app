<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>単語帳アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#202020;color:white;min-height:100vh}
body.light{background:#eef3f8;color:#111}
.app{max-width:760px;margin:auto;min-height:100vh;padding:24px 24px 110px}
.screen{display:none}.screen.active{display:block}
.top{height:44px;display:flex;align-items:center;justify-content:space-between}
.icon{border:0;background:none;color:white;font-size:28px;cursor:pointer}
body.light .icon{color:#111}
.back{color:#ff5b7f}.hidden{visibility:hidden}
.title{font-size:22px;font-weight:900;text-align:center}
body.study-title-off #topTitle{visibility:hidden}
.card,.stat,.sliderBox,.stepBox{background:#2b2b2b;border-radius:28px;padding:28px;box-shadow:0 12px 35px rgba(0,0,0,.35)}
body.light .card,body.light .stat,body.light .sliderBox,body.light .stepBox{background:white;color:#111}
.center{min-height:calc(100vh - 180px);display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
button{height:54px;border:0;border-radius:16px;padding:0 18px;font-size:16px;font-weight:900;color:white;background:#697582;cursor:pointer}
button:active{transform:scale(.97)}
.blue{background:linear-gradient(90deg,#007bff,#26d0ff)}
.green{background:#697582}
.red{background:#dc2626}
.dark{background:#4b5563}
.big{width:100%;height:62px;border-radius:30px;margin-top:14px}
.homeCard{width:100%;max-width:600px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:600px;margin-top:18px}
.stat{padding:18px;text-align:left}.statNum{font-size:30px;font-weight:900}.statLabel{font-size:13px;opacity:.7}
.bookList{max-height:55vh;overflow:auto;margin-top:28px}
.bookItem{background:#dcefff;color:#111;border-radius:14px;padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;font-weight:900}
.bookItem.selected{outline:4px solid #38bdf8;background:#bdeaff}
.tools{display:flex;gap:14px}
.selectedMsg{text-align:center;margin-top:14px;color:#38bdf8;font-weight:900;min-height:24px}
.selectedMsgMini{background:#38bdf8;color:white;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;white-space:nowrap}
.bookArea{display:grid;grid-template-columns:110px 1fr;gap:18px;margin-top:30px}
.plus{width:96px;height:96px;border-radius:50%;font-size:46px;background:#007bff}
input,select,textarea{width:100%;height:50px;background:#1f1f1f;color:white;border:1px solid #555;border-radius:10px;padding:12px;font-size:16px}
body.light input,body.light select,body.light textarea{background:#f8fafc;color:#111}
textarea{height:50px;resize:none}
.label{font-size:13px;opacity:.75;margin:14px 0 6px}
.editor{max-width:620px;margin:26px auto}.wordRow{background:#242424;border-radius:16px;padding:14px;margin-top:14px}
body.light .wordRow{background:#f1f5f9}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.rangeRow{display:flex;align-items:center;justify-content:center;gap:24px;margin:30px 0}.rangeRow select{width:130px;height:56px;text-align:center;font-size:20px;font-weight:900}.wave{font-size:36px;font-weight:900}
.modeRow{display:flex;justify-content:center;gap:16px;margin-bottom:30px}.pill{min-width:105px;border-radius:24px}
.studyCard{text-align:center;min-height:260px;display:flex;flex-direction:column;justify-content:center}
.pageInfo{opacity:.7;margin-bottom:16px}
.wordLine{display:flex;justify-content:center;align-items:center;gap:10px}
.posBadge{min-width:24px;height:24px;border-radius:6px;background:#4b5563;color:white;display:none;align-items:center;justify-content:center;font-size:13px;font-weight:900;line-height:1;padding:0 6px;transform:translateY(4px)}
.word{font-size:56px;font-weight:900;word-break:break-word}
.answer{font-size:34px;font-weight:800;min-height:48px;margin-top:22px}
.modeSwitch{display:flex;align-items:center;justify-content:flex-end;gap:12px;margin:12px 0}
.switch{position:relative;width:78px;height:38px}.switch input{display:none}.slider{position:absolute;inset:0;background:#555;border-radius:40px}.slider:before{content:"";position:absolute;width:30px;height:30px;left:4px;top:4px;background:white;border-radius:50%;transition:.2s}.switch input:checked+.slider{background:#7f8a99}.switch input:checked+.slider:before{transform:translateX(40px)}
.mainControl{display:flex;justify-content:center;margin:18px 0}.circle{width:96px;height:96px;border-radius:50%;font-size:20px}
.stepBox{text-align:center;border-radius:18px;padding:12px;margin:10px 0}.stepBox button{height:38px;padding:0 13px}.stepNum{font-size:24px;font-weight:900;margin:0 10px}
.moveRow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:10px}
.sliders{display:none;grid-template-columns:1fr 1fr;gap:14px;margin-top:26px}.sliders.show{display:grid}.sliderBox{border-radius:18px;padding:14px}.sliderBox label{font-size:13px;opacity:.75}.sliderBox div{font-weight:900;margin:6px 0}.sliderBox input{height:auto}
.settingsBox{max-width:520px;width:100%}.future{margin-top:38px;opacity:.65}
.testChoices{display:grid;gap:14px;margin-top:28px}.choice{background:white;color:#111;border:3px solid #ddd;border-radius:14px;min-height:64px}.choice.correct{border-color:#38bdf8;background:#dbeafe}.choice.wrong{border-color:#dc2626;background:#fee2e2}
.bottomNav{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:min(560px,calc(100% - 28px));height:74px;background:#252525;border-radius:28px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.35)}
body.light .bottomNav{background:white;border:1px solid #ccc}
.nav{background:transparent;border-radius:0;font-size:21px;color:white;text-shadow:0 0 4px #000}
body.light .nav{color:#111;text-shadow:0 0 3px white}
.nav span{display:block;font-size:11px}.nav.active{background:linear-gradient(90deg,#007bff,#26d0ff);color:white}

/* 学習画面：左右操作パネル */
.studySideControls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin:12px 0 10px;
}
.sideStepBox{
  background:#2b2b2b;
  border-radius:18px;
  padding:12px;
  text-align:center;
  box-shadow:0 12px 35px rgba(0,0,0,.18);
}
body.light .sideStepBox{
  background:white;
  color:#111;
}
.sideStepBox button{
  height:38px;
  padding:0 13px;
}
.sideStepNum{
  font-size:24px;
  font-weight:900;
  margin:0 10px;
}
.sliders{
  margin-top:34px;
}

/* 単語編集：保存ボタンを下に固定 */
.editor{
  padding-bottom:110px;
}
.editActions{
  position:sticky;
  bottom:92px;
  z-index:20;
  background:#2b2b2b;
  padding:12px;
  border-radius:20px;
  box-shadow:0 -8px 25px rgba(0,0,0,.25);
}
body.light .editActions{
  background:white;
}


html{
  scrollbar-gutter:stable;
}
body{
  overflow-y:scroll;
}
#study{
  overflow-x:hidden;
}


/* 範囲・テスト画面の位置統一 */
.setupStartBtn{
  max-width:280px;
  margin-top:26px;
}

.testCountSelect{
  max-width:150px;
  height:48px;
  font-size:16px;
  font-weight:900;
  text-align:center;
}

.testCountBlock{
  margin-top:10px;
}

.testResultBox{
  max-width:680px;
  width:100%;
  margin:24px auto;
}

.resultItem{
  background:#2b2b2b;
  color:white;
  border-radius:16px;
  padding:14px;
  margin:12px 0;
  text-align:left;
}

body.light .resultItem{
  background:white;
  color:#111;
}

.resultItem.correct{
  border:3px solid #38bdf8;
}

.resultItem.wrong{
  border:3px solid #dc2626;
}

.resultMark{
  font-weight:900;
  margin-bottom:8px;
}

.resultLine{
  font-size:14px;
  margin:5px 0;
  opacity:.9;
}

.resultAnswer{
  font-weight:900;
}

.pageControlBtn:disabled{
  opacity:.35;
  cursor:not-allowed;
  transform:none;
}


/* 単語帳・テストの開始画面位置を完全統一 */
.setupBox{
  width:100%;
  max-width:360px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.setupTitle{
  margin-bottom:24px;
}

  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;

}

.setupRange select{
  width:100px;
  height:56px;
  text-align:center;
  font-size:20px;
  font-weight:900;
}

.setupModeRow{
  display:flex;
  justify-content:center;
  gap:16px;
  margin:0 0 28px;
}

.setupStartBtn{
  width:100%;
  max-width:280px;
  height:62px;
  border-radius:30px;
  margin-top:0;
}

.testCountBlock{
  margin-top:18px;

  flex-direction:column;
  align-items:center;
}

.testCountSelect{

/* v12: 単語帳・テスト開始画面を完全統一 */

/* 結果画面の重複項目削除後の見た目 */
.resultItem{
  line-height:1.55;
}


.recordList{
  width:100%;
  max-width:520px;
  margin-top:22px;
  display:grid;
  gap:12px;
}

.recordItem{
  background:#2b2b2b;

  border-radius:16px;
  padding:14px 16px;

}

body.light .recordItem{
  background:white;

}

.recordDate{
  font-size:15px;
}

.recordTime{
  font-size:18px;
  color:#38bdf8;
}

.emptyRecord{
  opacity:.65;
  margin-top:22px;
  font-weight:900;
}


/* v15: 単語帳タイプ・ */
.modePickRow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0 20px;width:100%;max-width:360px}
.modePickRow button{height:54px;border-radius:18px;font-weight:900}
.tagColorRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:8px 0 16px}
.tagColorBtn{width:34px;height:34px;border-radius:11px;border:3px solid transparent;padding:0;box-shadow:0 4px 12px rgba(0,0,0,.18)}
.tagColorBtn.active{border-color:white;box-shadow:0 0 0 2px rgba(59,130,246,.9)}
body.light .tagColorBtn.active{border-color:#111}
.posBadge{background:var(--tag-color,#4b5563) !important}


/* v16: 登録画面の保存/サンプルは最下部固定、＋追加は追従しない */
#register .registerActions,
#edit .registerActions,
#register .stickyActions,
#edit .stickyActions,
#register .saveActions,
#edit .saveActions,
#register .bottomActions,
#edit .bottomActions{
  position:fixed !important;
  left:50% !important;
  transform:translateX(-50%) !important;
  right:auto !important;
  bottom:96px !important;
  width:calc(100% - 34px) !important;
  max-width:680px !important;
  display:grid !important;
  grid-template-columns:1fr 1fr !important;
  gap:14px !important;
  padding:14px !important;
  border-radius:24px !important;
  background:rgba(28,28,28,.88) !important;

  box-shadow:0 12px 36px rgba(0,0,0,.30) !important;
}

body.light #register .registerActions,

body.light #edit .stickyActions,

}

#edit .registerActions button,
#register .stickyActions button,
#edit .stickyActions button,
#register .saveActions button,
#edit .saveActions button,
#register .bottomActions button,
#edit .bottomActions button{

  height:64px !important;
  border-radius:22px !important;
}

/* ＋単語を追加は固定しない */
#register .addWordBtn,
#edit .addWordBtn,
#register button[onclick*="addWord"],
#edit button[onclick*="addWord"],
#register button[onclick*="addCard"],
#edit button[onclick*="addCard"]{

}

/* 固定保存ボタンに隠れないよう登録画面の下に余白 */
#register .center,
#edit .center{

}

/* v16: 自動ONは少しだけ濃い灰色 */
.switch input:checked + .slider{

}


/* v17: モード選択の青表示修正 */
.modePickRow button{
  background:#4b5563 !important;
  color:white !important;
  transition:.18s;
}
.modePickRow button.active{
  background:linear-gradient(90deg,#0b6cff,#39d2ff) !important;
  box-shadow:0 6px 18px rgba(0,140,255,.25);
}

/* v17: 単語帳選択の見切れ修正 */
.bookItem.selected,
.bookRow.selected,
.book.selected{
  box-sizing:border-box !important;
  width:100% !important;
  overflow:visible !important;
  padding-right:14px !important;
}

/* v17: 下タブの登録ボタンサイズ調整 */
.bottomNav .active,
.bottomNav .current,
.bottomNav .selected{

  padding:0 18px !important;
  margin:4px !important;

  align-items:center !important;
  justify-content:center !important;
  background:linear-gradient(90deg,#0b6cff,#39d2ff) !important;
}

/* v17: 編集/削除ボタンの間隔 */
.bookActions,
.actions{
  gap:18px !important;
}


/* v18: スマホ用に編集/削除ボタンを大きく離す */
.bookItem,
.bookRow,
.book{

  min-height:64px !important;

}

.bookActions,
.bookItem .actions,
.bookRow .actions,
.bookTools,
.bookButtons,

}

.bookActions button,
.bookItem .actions button,
.bookRow .actions button,
.bookTools button,
.bookButtons button,
.actions button{

/* 選択中でも右端が見切れないように */

.bookRow.selected,

/* タイトルがアイコンに被らないように */

  }

/* 編集ボタン */
.bookActions button:first-child,
.bookItem .actions button:first-child,
.bookRow .actions button:first-child,
.bookTools button:first-child,
.bookButtons button:first-child,

<script>
const APP_VERSION = "Vr_a7.0.1";

const DEFAULT_BOOKS=[{name:"新しい単語帳",mode:"english",cards:[{word:"apple",pos:"名詞",answer:"りんご"},{word:"book",pos:"名詞",answer:"本"}]}];

function safeJsonParse(value,fallback){
  try{
    if(value===null || value===undefined || value==="")return fallback;
    return JSON.parse(value);
  }catch(e){
    return fallback;
  }
}

function isValidBooksData(data){
  return Array.isArray(data) && data.length>0 && data.every(book=>{
    return book && typeof book==="object" && Array.isArray(book.cards);
  });
}

function cloneDefaultBooks(){
  return JSON.parse(JSON.stringify(DEFAULT_BOOKS));
}

function loadBooksSafely(){
  const main=safeJsonParse(localStorage.getItem("books"),null);
  if(isValidBooksData(main))return main;

  const latest=safeJsonParse(localStorage.getItem("books_backup_latest"),null);
  if(isValidBooksData(latest)){
    localStorage.setItem("books",JSON.stringify(latest));
    return latest;
  }

  const backup1=safeJsonParse(localStorage.getItem("books_backup_1"),null);
  if(isValidBooksData(backup1)){
    localStorage.setItem("books",JSON.stringify(backup1));
    return backup1;
  }

  const backup2=safeJsonParse(localStorage.getItem("books_backup_2"),null);
  if(isValidBooksData(backup2)){
    localStorage.setItem("books",JSON.stringify(backup2));
    return backup2;
  }

  const backup3=safeJsonParse(localStorage.getItem("books_backup_3"),null);
  if(isValidBooksData(backup3)){
    localStorage.setItem("books",JSON.stringify(backup3));
    return backup3;
  }

  return cloneDefaultBooks();
}

function saveBooksWithBackup(data){
  try{
    const next=JSON.stringify(data);
    const old=localStorage.getItem("books");

    if(old && old!==next){
      localStorage.setItem("books_backup_3",localStorage.getItem("books_backup_2")||old);
      localStorage.setItem("books_backup_2",localStorage.getItem("books_backup_1")||old);
      localStorage.setItem("books_backup_1",old);
    }

    localStorage.setItem("books",next);
    localStorage.setItem("books_backup_latest",next);
    localStorage.setItem("books_backup_time",new Date().toISOString());
  }catch(e){
    alert("保存に失敗しました。Safariの容量・プライベートブラウズ・サイトデータ設定を確認してください。");
    console.error(e);
  }
}



function openBackupSaveGuide(){
  const old=document.getElementById("backupSaveGuideModal");
  if(old)old.remove();

  const modal=document.createElement("div");
  modal.id="backupSaveGuideModal";
  modal.className="sampleMenuOverlay";
  modal.innerHTML=`
    <div class="sampleMenuBox">
      <h2>バックアップ保存</h2>
      <div style="text-align:left;line-height:1.7;font-size:14px;margin:14px 0 18px">
        <div style="font-weight:900;margin-bottom:8px">保存前に確認してください</div>
        <div>・このあとバックアップ用のJSONファイルを作成します。</div>
        <div>・iPhoneではファイルが表示される場合があります。</div>
        <div>・その場合は画面下の「共有」→「ファイルに保存」を押してください。</div>
        <div>・復元するときは「バックアップ復元」から保存したJSONを選びます。</div>
      </div>
      <button type="button" class="blue sampleCancelBtn" onclick="confirmBackupSaveStart()">保存開始</button>
      <button type="button" class="dark sampleCancelBtn" style="margin-top:10px" onclick="closeBackupSaveGuide()">戻る</button>
    </div>
  `;
  document.body.appendChild(modal);
}

function closeBackupSaveGuide(){
  const modal=document.getElementById("backupSaveGuideModal");
  if(modal)modal.remove();
}

function confirmBackupSaveStart(){
  closeBackupSaveGuide();
  startBackupDownload();
}

function startBackupDownload(){
  try{
    const data={
      app:"単語帳アプリ",
      version:"Vr_a7.0.1",
      createdAt:new Date().toISOString(),
      books:books,
      currentBook:currentBook,
      studyRecords:studyRecords
    };

    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    const d=new Date();
    const y=d.getFullYear();
    const m=String(d.getMonth()+1).padStart(2,"0");
    const day=String(d.getDate()).padStart(2,"0");

    a.href=url;
    a.download=`tango_backup_${y}${m}${day}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);

    alert("バックアップを保存しました");
  }catch(e){
    alert("バックアップ保存に失敗しました");
    console.error(e);
  }
}


function openBackupFilePicker(){
  const input=document.getElementById("backupFileInput");
  if(!input){
    alert("バックアップ読み込み機能が見つかりません");
    return;
  }
  input.value="";
  input.click();
}

function restoreBackupFromFile(event){
  const file=event.target.files && event.target.files[0];
  if(!file)return;

  const reader=new FileReader();

  reader.onload=function(){
    try{
      const data=JSON.parse(reader.result);

      let nextBooks=null;
      let nextCurrentBook=0;
      let nextStudyRecords=null;

      if(Array.isArray(data)){
        nextBooks=data;
      }else if(data && Array.isArray(data.books)){
        nextBooks=data.books;
        nextCurrentBook=Number(data.currentBook||0);
        if(data.studyRecords && typeof data.studyRecords==="object"){
          nextStudyRecords=data.studyRecords;
        }
      }

      if(!isValidBooksData(nextBooks)){
        alert("このバックアップファイルは読み込めません");
        return;
      }

      if(!confirm("このバックアップから復元しますか？\n現在の単語帳データは置き換わります。")){
        return;
      }

      books=nextBooks;
      currentBook=Math.max(0,Math.min(nextCurrentBook,books.length-1));

      if(nextStudyRecords){
        studyRecords=nextStudyRecords;
        localStorage.setItem("studyRecords",JSON.stringify(studyRecords));
      }

      saveBooksWithBackup(books);
      localStorage.setItem("currentBook",currentBook);
      save();
      update();

      alert("バックアップから復元しました");
      go("home");
    }catch(e){
      alert("バックアップファイルの読み込みに失敗しました");
      console.error(e);
    }
  };

  reader.readAsText(file,"utf-8");
}

function manualRestoreBooks(){
  const backups=[
    safeJsonParse(localStorage.getItem("books_backup_latest"),null),
    safeJsonParse(localStorage.getItem("books_backup_1"),null),
    safeJsonParse(localStorage.getItem("books_backup_2"),null),
    safeJsonParse(localStorage.getItem("books_backup_3"),null)
  ].filter(isValidBooksData);

  if(!backups.length){
    alert("復元できるバックアップがありません");
    return;
  }

  if(confirm("バックアップから単語帳を復元しますか？")){
    books=backups[0];
    saveBooksWithBackup(books);
    save();
    update();
    alert("バックアップから復元しました");
  }
}

let books=loadBooksSafely();

let currentBook=Number(localStorage.getItem("currentBook")||0);
migrateBookModes();
if(currentBook<0||currentBook>=books.length)currentBook=0;

let cards=[],index=0,answerVisible=false,qType="wm",auto=false,autoTimer=null,answerTimer=null,prevStep=1,nextStep=1,currentScreen="home";
let studyReturnScreen="range";
let randomOrder=false;
let studyRecords=JSON.parse(localStorage.getItem("studyRecords")||"{}");
let currentStudyDate=todayKey();
let studySeconds=Number(studyRecords[currentStudyDate]||0),studyTimer=null,studying=false;
let testCards=[],testIndex=0,testScore=0,testQType="wm",testResults=[],testNoPrev=false;
const $=id=>document.getElementById(id);

if(localStorage.getItem("theme")==="light")document.body.classList.add("light");

const BOOK_MODES={
  english:{name:"英語",tagMap:{"動詞":"動","自動詞":"自","他動詞":"他","名詞":"名","形容詞":"形","副詞":"副","副詞節":"副","熟語":"熟","句動詞":"句","前置詞":"前","接続詞":"接"}},
  kobun:{name:"古文",tagMap:{"動詞":"動","自動詞":"自","他動詞":"活","名詞":"名","形容詞":"形","副詞":"副","副詞節":"助","熟語":"敬","句動詞":"枕","前置詞":"係","接続詞":"接"}},
  kanbun:{name:"漢文",tagMap:{"動詞":"動","自動詞":"句","他動詞":"再","名詞":"漢","形容詞":"読","副詞":"否","副詞節":"使","熟語":"重","句動詞":"返","前置詞":"置","接続詞":"接"}}
};

function currentBookMode(){return books[currentBook]?.mode||"english";}
function modeName(mode){return BOOK_MODES[mode]?.name||"英語";}
function tagShortByMode(pos,mode=currentBookMode()){
  pos=String(pos||"").trim();
  if(!pos)return "";
  const map=BOOK_MODES[mode]?.tagMap||BOOK_MODES.english.tagMap;
  if(map[pos])return map[pos];
  if(pos==="動"||pos==="動詞"||pos.toLowerCase()==="verb")return map["動詞"]||"動";
  if(pos==="自"||pos.includes("自動詞")||pos.toLowerCase()==="vi")return map["自動詞"]||"自";
  if(pos==="他"||pos.includes("他動詞")||pos.toLowerCase()==="vt")return map["他動詞"]||"他";
  if(pos==="名"||pos.includes("名詞")||pos.toLowerCase()==="noun")return map["名詞"]||"名";
  if(pos==="形"||pos.includes("形容詞")||pos.toLowerCase()==="adj")return map["形容詞"]||"形";
  if(pos==="副"||pos.includes("副詞")||pos.includes("副詞節")||pos.toLowerCase()==="adv")return map["副詞"]||"副";
  if(pos==="熟"||pos.includes("熟語"))return map["熟語"]||"熟";
  if(pos==="句"||pos.includes("句動詞"))return map["句動詞"]||"句";
  if(pos==="前"||pos.includes("前置詞"))return map["前置詞"]||"前";
  if(pos==="接"||pos.includes("接続詞"))return map["接続詞"]||"接";
  return pos.slice(0,1);
}
function migrateBookModes(){
  books.forEach(b=>{
    if(!b.mode)b.mode="english";
    (b.cards||[]).forEach(c=>{
      if(!c.tagColor)c.tagColor="#4b5563";
    });
  });
}
const TAG_COLORS=["#4b5563","#2563eb","#16a34a","#dc2626","#9333ea","#ea580c","#0891b2","#db2777","#ca8a04","#111827"];


function todayKey(){
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}

function syncTodayStudy(){
  const today=todayKey();

  if(today!==currentStudyDate){
    currentStudyDate=today;
    studySeconds=Number(studyRecords[currentStudyDate]||0);
  }

  if(!(currentStudyDate in studyRecords)){
    studyRecords[currentStudyDate]=studySeconds;
  }
}

function saveStudyRecords(){
  studyRecords[currentStudyDate]=studySeconds;
  localStorage.setItem("studyRecords",JSON.stringify(studyRecords));
  localStorage.setItem("studySeconds",studySeconds);
}

function formatDateLabel(key){
  const parts=String(key).split("-");
  if(parts.length!==3)return key;
  return `${Number(parts[1])}/${Number(parts[2])}`;
}

function renderStudyRecords(){
  const box=$("recordList");
  if(!box)return;

  syncTodayStudy();
  saveStudyRecords();

  const entries=Object.entries(studyRecords)
    .filter(([_,sec])=>Number(sec)>0)
    .sort((a,b)=>b[0].localeCompare(a[0]));

  box.innerHTML="";

  if(!entries.length){
    box.innerHTML='<div class="emptyRecord">まだ学習記録はありません</div>';
    return;
  }

  entries.forEach(([date,sec])=>{
    const div=document.createElement("div");
    div.className="recordItem";
    div.innerHTML=`
      <span class="recordDate">${formatDateLabel(date)}</span>
      <span class="recordTime">${format(sec)}</span>
    `;
    box.appendChild(div);
  });
}


function save(){
  syncTodayStudy();
  saveStudyRecords();
  saveBooksWithBackup(books);
  localStorage.setItem("currentBook",currentBook);
}

function baseCards(){return books[currentBook]?.cards||[]}

function saveStudyState(){
  const state={
    book:currentBook,
    index:index,
    qType:qType,
    randomOrder:randomOrder,
    start:Number($("startNum")?.value||1),
    end:Number($("endNum")?.value||baseCards().length||1)
  };
  localStorage.setItem("lastStudyState",JSON.stringify(state));
}

function loadStudyState(){
  try{
    return JSON.parse(localStorage.getItem("lastStudyState")||"null");
  }catch(e){
    return null;
  }
}

function go(id){
  currentScreen=id;
  document.body.classList.toggle("study-title-off",id==="study");
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  $(id).classList.add("active");
  document.querySelectorAll(".nav").forEach(n=>n.classList.remove("active"));
  if(id==="home"||id==="pickBook")$("navHome").classList.add("active");
  if(id==="range")$("navRange").classList.add("active");
  if(id==="testSetup"||id==="testPlay"||id==="testResult")$("navTest").classList.add("active");
  if(id==="register"||id==="edit")$("navReg").classList.add("active");

  $("topTitle").textContent=id==="home"?"単語登録":id==="pickBook"?"単語帳選択":id==="range"?"単語帳":id==="testSetup"?"テスト":id==="testPlay"?"テスト中":id==="testResult"?"テスト結果":id==="register"?"単語登録":id==="edit"?"単語編集":id==="study"?"学習中":id==="records"?"学習記録":id==="bookModePick"?"単語帳タイプ":"設定";
  $("backBtn").classList.toggle("hidden",id==="home");
  $("gearBtn").style.visibility=(id==="study"||id==="testPlay"||id==="testResult")?"hidden":"visible";
  $("bottomNav").style.display=(id==="study"||id==="testPlay"||id==="testResult")?"none":"grid";
  const noticeBtn=$("noticeBtn");
  if(noticeBtn){
    noticeBtn.classList.toggle("noticeHidden", id!=="home");
  }
  if(id!=="study")stopStudy();
  if(id!=="pickBook")$("pickMsg").textContent="";
  if(id==="records")renderStudyRecords();
  update();
}

function backAction(){
  if(currentScreen==="edit")go("register");
  else if(currentScreen==="study")go(studyReturnScreen||"range");
  else if(currentScreen==="testPlay"||currentScreen==="testResult")go("testSetup");
  else if(currentScreen==="records")go("settings");
  else go("home");
}

function update(){
  syncTodayStudy();
  if(currentBook<0||currentBook>=books.length)currentBook=0;
  $("statCount").textContent=books.reduce((a,b)=>a+b.cards.length,0);
  $("studyTime").textContent=format(studySeconds);
  updateBookLists();
  updateRange();
  updateTestSetup();
  updateTestModeButtons();
  updateRandomButtonUI();
  updateThemeBtn();
  render();
}

function format(s){let m=Math.floor(s/60);return m<60?m+"分":Math.floor(m/60)+"時間"+(m%60)+"分"}

function updateBookLists(){
  const make=(boxId,pickMode)=>{
    let box=$(boxId);
    box.innerHTML="";

    books.forEach((b,i)=>{
      let div=document.createElement("div");
      div.className="bookItem"+(i===currentBook?" selected":"");

      let status=i===currentBook?'<span class="selectedMsgMini">選択中</span>':"";

      div.innerHTML=`
        <div style="display:flex;align-items:center;gap:10px;min-width:0">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(b.name)}</span>
          ${status}
        </div>
        <span class="tools">
          <button type="button" class="bookEditBtn">編集</button>
          <button type="button" class="bookDeleteBtn">削除</button>
        </span>
      `;

      div.onclick=()=>{
        currentBook=i;
        save();

        if(pickMode){
          $("pickMsg").textContent="切り替え中…";
          updateBookLists();

          setTimeout(()=>{
            $("pickMsg").textContent="";
            go("home");
          },350);
        }else{
          updateBookLists();
        }
      };

      const toolSpans=div.querySelectorAll(".tools button");

      toolSpans[0].onclick=e=>{
        e.stopPropagation();
        currentBook=i;
        save();
        openEditor();
      };

      toolSpans[1].onclick=e=>{
        e.stopPropagation();
        if(books.length<=1){
          alert("単語帳は最低1つ必要です");
          return;
        }

        if(confirm("この単語帳を削除しますか？")){
          books.splice(i,1);
          if(currentBook>=books.length)currentBook=books.length-1;
          save();
          update();
        }
      };

      box.appendChild(div);
    });
  };

  make("pickBookList",true);
  make("bookList",false);
}

function updateRange(){
  let total=Math.max(baseCards().length,1);

  ["startNum","endNum"].forEach((id,i)=>{
    let sel=$(id),old=sel.value;
    sel.innerHTML="";
    for(let n=1;n<=total;n++){
      let o=document.createElement("option");
      o.value=n;
      o.textContent=n;
      sel.appendChild(o);
    }
    sel.value=old&&Number(old)<=total?old:(i===0?1:total);
  });

  if(Number($("endNum").value)<Number($("startNum").value))$("endNum").value=total;
}

function updateTestSetup(){
  let total=Math.max(baseCards().length,1);

  ["testStart","testEnd"].forEach((id,i)=>{
    let sel=$(id),old=sel.value;
    sel.innerHTML="";
    for(let n=1;n<=total;n++){
      let o=document.createElement("option");
      o.value=n;
      o.textContent=n;
      sel.appendChild(o);
    }
    sel.value=old&&Number(old)<=total?old:(i===0?1:total);
  });

  if(Number($("testEnd").value)<Number($("testStart").value))$("testEnd").value=$("testStart").value;

  syncTestCountOptions();
}

function syncTestCountOptions(){
  let tc=$("testCount");
  if(!tc)return;

  let maxCards=testCandidateCards().length;

  tc.innerHTML="";

  if(maxCards===0){
    let o=document.createElement("option");
    o.value=0;
    o.textContent="0問";
    tc.appendChild(o);
    return;
  }

  let s=Number($("testStart").value||1);
  let e=Number($("testEnd").value||maxCards);

  let a=Math.min(s,e);
  let b=Math.max(s,e);

  let rangeCount=b-a+1;
  let max=Math.min(rangeCount,maxCards);

  for(let n=1;n<=max;n++){
    let o=document.createElement("option");
    o.value=n;
    o.textContent=n+"問";
    tc.appendChild(o);
  }

  tc.value=Math.min(10,max);
}

function startTest(){
  const candidates=testCandidateCards();

  if(!candidates.length){
    alert("出題できる単語がありません");
    return;
  }

  let s=Number($("testStart").value||1);
  let e=Number($("testEnd").value||candidates.length);
  let a=Math.min(s,e);
  let b=Math.max(s,e);

  let rangeCards=candidates.slice(a-1,b);

  if(!rangeCards.length){
    rangeCards=candidates;
  }

  let count=Number($("testCount").value||1);
  count=Math.min(Math.max(1,count),10,rangeCards.length);

  testCards=shuffleArray(rangeCards).slice(0,count);
  testIndex=0;
  testScore=0;
  testResults=[];

  saveLastTestKeys(testCards.map(cardKey));

  go("testPlay");
  renderTest();
}


function renderTest(){
  if(!testCards.length)return;

  let q=testCards[testIndex];
  $("testInfo").textContent=`問題 ${testIndex+1} / ${testCards.length}`;
  $("testWord").textContent=testQuestionText(q);

  let choices=makeChoices(q);
  let box=$("testChoices");
  box.innerHTML="";

  choices.forEach(ch=>{
    let btn=document.createElement("button");
    btn.className="choice";
    btn.textContent=ch;

    btn.onclick=()=>{
      [...box.children].forEach(b=>b.disabled=true);

      const correctAnswer=testAnswerText(q);
      const isCorrect=ch===correctAnswer;

      testResults.push({
        question:testQuestionText(q),
        userAnswer:ch,
        correctAnswer:correctAnswer,
        word:q.word,
        answer:q.answer,
        correct:isCorrect
      });

      if(isCorrect){
        btn.classList.add("correct");
        testScore++;
      }else{
        btn.classList.add("wrong");
        [...box.children].forEach(b=>{
          if(b.textContent===correctAnswer)b.classList.add("correct");
        });
      }

      setTimeout(()=>{
        testIndex++;

        if(testIndex>=testCards.length){
          showTestResult();
        }else{
          renderTest();
        }
      },700);
    };

    box.appendChild(btn);
  });
}

function showTestResult(){
  $("testResultScore").textContent=`${testScore} / ${testCards.length} 正解`;

  let box=$("testResultList");
  box.innerHTML="";

  testResults.forEach((r,i)=>{
    let div=document.createElement("div");
    div.className="resultItem "+(r.correct?"correct":"wrong");

    div.innerHTML=`
      <div class="resultMark">${i+1}. ${r.correct?"○ 正解":"× 不正解"}</div>
      <div class="resultLine">問題：<span class="resultAnswer">${escapeHtml(r.question)}</span></div>
      <div class="resultLine">あなたの回答：<span class="resultAnswer">${escapeHtml(r.userAnswer)}</span></div>
      <div class="resultLine">正しい答え：<span class="resultAnswer">${escapeHtml(r.correctAnswer)}</span></div>
    `;

    box.appendChild(div);
  });

  go("testResult");
}

function makeChoices(q){
  const correctAnswer=testAnswerText(q);
  let answers=[...new Set(baseCards().map(c=>testAnswerText(c)).filter(a=>a&&a!==correctAnswer))];
  answers=shuffleArray(answers).slice(0,3);
  return shuffleArray([correctAnswer,...answers]);
}

function cardKeyForRandom(c){
  return String((c&&c.word)||"")+"|||"+String((c&&c.answer)||"");
}

function loadRandomMemory(){
  try{
    const data=JSON.parse(localStorage.getItem("randomMemoryV2")||"{}");
    return {
      firstKeys:Array.isArray(data.firstKeys)?data.firstKeys:[],
      overallKeys:Array.isArray(data.overallKeys)?data.overallKeys:[]
    };
  }catch(e){
    return {firstKeys:[],overallKeys:[]};
  }
}

function saveRandomMemory(firstKey,orderKeys){
  const memory=loadRandomMemory();

  if(firstKey){
    memory.firstKeys.unshift(firstKey);
    memory.firstKeys=[...new Set(memory.firstKeys)].slice(0,8);
  }

  (orderKeys||[]).forEach(k=>memory.overallKeys.unshift(k));
  memory.overallKeys=[...new Set(memory.overallKeys)].slice(0,20);

  localStorage.setItem("randomMemoryV2",JSON.stringify(memory));
}

function weightedPickIndex(pool,memory,position,resultKeys){
  const weights=pool.map(c=>{
    const key=cardKeyForRandom(c);
    let weight=1;

    const firstPos=memory.firstKeys.indexOf(key);
    if(position===0){
      if(firstPos===0)weight*=0.03;
      else if(firstPos===1)weight*=0.10;
      else if(firstPos===2)weight*=0.22;
      else if(firstPos>=3&&firstPos<6)weight*=0.45;
    }else{
      if(firstPos===0)weight*=0.35;
      else if(firstPos===1)weight*=0.55;
    }

    const overallPos=memory.overallKeys.indexOf(key);
    if(overallPos===0)weight*=0.25;
    else if(overallPos===1)weight*=0.35;
    else if(overallPos===2)weight*=0.50;
    else if(overallPos>=3&&overallPos<6)weight*=0.70;

    const justPickedPos=resultKeys.indexOf(key);
    if(justPickedPos===0)weight*=0.05;
    else if(justPickedPos===1)weight*=0.25;

    return Math.max(weight,0.01);
  });

  const total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;

  for(let i=0;i<weights.length;i++){
    r-=weights[i];
    if(r<=0)return i;
  }

  return pool.length-1;
}

function shuffleArray(arr){
  let pool=[...arr];
  let result=[];
  let resultKeys=[];
  const memory=loadRandomMemory();

  while(pool.length){
    const pickIndex=weightedPickIndex(pool,memory,result.length,resultKeys);
    const picked=pool.splice(pickIndex,1)[0];
    const key=cardKeyForRandom(picked);

    result.push(picked);
    resultKeys.unshift(key);
  }

  saveRandomMemory(resultKeys[resultKeys.length-1],resultKeys.slice().reverse());
  return result;
}
